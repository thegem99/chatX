<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Chat App</title>
<style>
body { font-family: Arial; margin: 20px; }
#contacts { margin-top: 20px; }
#messages { border: 1px solid #ccc; height: 200px; overflow-y: scroll; padding: 5px; }
.message { margin: 5px 0; }
</style>
</head>
<body>
<h1>Welcome {{ username }}</h1>

<h3>Search Users</h3>
<input type="text" id="searchInput" placeholder="Username">
<button onclick="searchUsers()">Search</button>
<div id="searchResults"></div>

<h3>Contacts</h3>
<ul id="contactsList"></ul>

<h3>Chat with <span id="chatWith"></span></h3>
<div id="messages"></div>
<input type="text" id="msgInput" placeholder="Message">
<button onclick="sendMsg()">Send</button>

<script>
const username = "{{ username }}";
let currentChatId = "";

async function searchUsers(){
    const query = document.getElementById("searchInput").value;
    const res = await fetch(`/search/${username}/${query}`);
    const users = await res.json();
    const container = document.getElementById("searchResults");
    container.innerHTML = "";
    users.forEach(u=>{
        const btn = document.createElement("button");
        btn.innerText = "Send request to " + u.username;
        btn.onclick = async ()=>{ await fetch(`/send_request/${username}/${u._id}`, {method:"POST"}); alert("Request sent"); loadContacts();}
        container.appendChild(btn); container.appendChild(document.createElement("br"));
    });
}

async function loadContacts(){
    const res = await fetch(`/contacts/${username}`);
    const contacts = await res.json();
    const list = document.getElementById("contactsList");
    list.innerHTML = "";
    contacts.forEach(c=>{
        const li = document.createElement("li");
        li.innerText = c.username;
        li.onclick = ()=>{ currentChatId = c._id; document.getElementById("chatWith").innerText = c.username; loadMessages(); };
        list.appendChild(li);
    });
}

async function loadMessages(){
    const res = await fetch(`/chat/${username}/${currentChatId}`);
    const msgs = await res.json();
    const container = document.getElementById("messages");
    container.innerHTML = "";
    msgs.forEach(m=>{
        const div = document.createElement("div");
        div.className = "message"; div.innerText = m.sender + ": " + m.message;
        container.appendChild(div);
    });
}

async function sendMsg(){
    const msg = document.getElementById("msgInput").value;
    await fetch(`/chat/${username}/${currentChatId}`, {method:"POST", body: new URLSearchParams({message: msg})});
    document.getElementById("msgInput").value="";
    loadMessages();
}

loadContacts();
</script>
</body>
</html>
