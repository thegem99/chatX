<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        #sidebar {
            width: 25%;
            background: #2d3748;
            color: white;
            padding: 10px;
        }

        #sidebar h3 {
            text-align: center;
        }

        #contacts li {
            list-style: none;
            padding: 10px;
            background: #4a5568;
            margin: 5px 0;
            cursor: pointer;
            border-radius: 5px;
        }

        #contacts li:hover {
            background: #667eea;
        }

        /* Main Chat */
        #main {
            width: 75%;
            display: flex;
            flex-direction: column;
        }

        #topbar {
            background: #667eea;
            color: white;
            padding: 10px;
        }

        #chatBox {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            background: #f1f1f1;
        }

        .msg {
            margin: 5px;
            padding: 8px;
            background: white;
            border-radius: 5px;
            max-width: 60%;
        }

        #inputArea {
            display: flex;
            padding: 10px;
            background: #ddd;
        }

        #inputArea input {
            flex: 1;
            padding: 10px;
        }

        #inputArea button {
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
        }

        #searchBox {
            width: 90%;
            padding: 8px;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>{{ username }}</h3>

    <input id="searchBox" placeholder="Search user">
    <button onclick="search()">Search</button>

    <div id="results"></div>

    <h3>Contacts</h3>
    <ul id="contacts"></ul>
</div>

<div id="main">
    <div id="topbar">Chat</div>

    <div id="chatBox"></div>

    <div id="inputArea">
        <input id="msg" placeholder="Type message...">
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
let username = "{{ username }}";
let currentChat = "";

async function search(){
    let q = document.getElementById("searchBox").value;
    let res = await fetch(`/search/${username}/${q}`);
    let data = await res.json();

    let div = document.getElementById("results");
    div.innerHTML = "";

    data.forEach(u=>{
        let btn = document.createElement("button");
        btn.innerText = "Add " + u.username;
        btn.onclick = ()=> sendRequest(u._id);
        div.appendChild(btn);
        div.appendChild(document.createElement("br"));
    });
}

async function sendRequest(id){
    await fetch(`/send_request/${username}/${id}`, {method:"POST"});
    alert("Request sent");
}

async function loadContacts(){
    let res = await fetch(`/contacts/${username}`);
    let data = await res.json();

    let list = document.getElementById("contacts");
    list.innerHTML = "";

    data.forEach(c=>{
        let li = document.createElement("li");
        li.innerText = c.username;
        li.onclick = ()=> openChat(c._id, c.username);
        list.appendChild(li);
    });
}

async function openChat(id, name){
    currentChat = id;
    document.getElementById("topbar").innerText = name;
    loadMessages();
}

async function loadMessages(){
    let res = await fetch(`/chat/${username}/${currentChat}`);
    let data = await res.json();

    let box = document.getElementById("chatBox");
    box.innerHTML = "";

    data.forEach(m=>{
        box.innerHTML += `<div class="msg">${m.sender}: ${m.message}</div>`;
    });
}

async function send(){
    let msg = document.getElementById("msg").value;

    await fetch(`/chat/${username}/${currentChat}`, {
        method:"POST",
        body: new URLSearchParams({message: msg})
    });

    document.getElementById("msg").value="";
    loadMessages();
}

loadContacts();
</script>

</body>
</html>
