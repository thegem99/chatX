<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>
</head>
<body>

<h2>Welcome {{ username }}</h2>

<h3>Search User</h3>
<input id="searchBox" placeholder="username">
<button onclick="search()">Search</button>

<div id="results"></div>

<h3>Contacts</h3>
<ul id="contacts"></ul>

<h3>Chat</h3>
<div id="chatBox" style="border:1px solid black;height:200px;overflow:auto;"></div>
<input id="msg">
<button onclick="send()">Send</button>

<script>
let username = "{{ username }}";
let currentChat = "";

async function search(){
    let q = document.getElementById("searchBox").value;
    let res = await fetch(`/search/${username}/${q}`);
    let data = await res.json();

    let div = document.getElementById("results");
    div.innerHTML = "";

    data.forEach(u=>{
        let btn = document.createElement("button");
        btn.innerText = "Add " + u.username;
        btn.onclick = ()=> sendRequest(u._id);
        div.appendChild(btn);
        div.appendChild(document.createElement("br"));
    });
}

async function sendRequest(id){
    await fetch(`/send_request/${username}/${id}`, {method:"POST"});
    alert("Request sent");
}

async function loadContacts(){
    let res = await fetch(`/contacts/${username}`);
    let data = await res.json();

    let list = document.getElementById("contacts");
    list.innerHTML = "";

    data.forEach(c=>{
        let li = document.createElement("li");
        li.innerText = c.username;
        li.onclick = ()=> openChat(c._id);
        list.appendChild(li);
    });
}

async function openChat(id){
    currentChat = id;
    loadMessages();
}

async function loadMessages(){
    let res = await fetch(`/chat/${username}/${currentChat}`);
    let data = await res.json();

    let box = document.getElementById("chatBox");
    box.innerHTML = "";

    data.forEach(m=>{
        box.innerHTML += `<div>${m.sender}: ${m.message}</div>`;
    });
}

async function send(){
    let msg = document.getElementById("msg").value;

    await fetch(`/chat/${username}/${currentChat}`, {
        method:"POST",
        body: new URLSearchParams({message: msg})
    });

    document.getElementById("msg").value="";
    loadMessages();
}

loadContacts();
</script>

</body>
</html>
